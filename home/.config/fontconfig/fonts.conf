<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- Emoji fallback for any font -->
  <match>
    <test name="family">
      <string>Iosevka</string>
    </test>
    <edit name="family" mode="append" binding="strong">
      <string>Noto Color Emoji</string>
    </edit>
  </match>

</fontconfig>
